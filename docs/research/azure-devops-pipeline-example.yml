# Azure DevOps YAML Pipeline with Release Notes Generation
# This pipeline demonstrates how to integrate the Azure DevOps release notes
# template that matches the GitHub format used in ntools

trigger:
  branches:
    include:
    - main
    - develop

pr:
  branches:
    include:
    - main
    - develop

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: Build
    displayName: 'Build and Test'
    pool:
      vmImage: 'windows-latest'

    steps:
    # Build steps here
    - script: echo "Building application..."
      displayName: 'Build Application'

    # Test steps here
    - script: echo "Running tests..."
      displayName: 'Run Tests'

    # Publish build artifacts
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Release
  displayName: 'Release Stage'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: 'Deploy to Production'
    environment: 'production'
    pool:
      vmImage: 'windows-latest'

    strategy:
      runOnce:
        deploy:
          steps:
          # Generate release notes using the GitHub-compatible template
          - task: XplatGenerateReleaseNotes@4
            displayName: 'Generate Release Notes'
            inputs:
              outputfile: '$(Build.ArtifactStagingDirectory)/releasenotes.md'
              templateLocation: 'File'
              templatefile: 'azure-devops-release-notes-template.md'
              checkStage: true
              getParentsAndChildren: true
              getPRDetails: true
              getAllParents: false
              sortCS: true
              sortWi: true
              showOnlyPrimary: false
              checkForManuallyLinkedWI: true
              searchCrossProjectForPRs: false
              emptySetText: 'No changes found.'
              replaceFile: true
              appendToFile: false
              stopOnRedeploy: true
              considerPartiallySuccessfulReleases: true
              getIndirectPullRequests: false
              stopOnError: false
              getTestedBy: true
              recursivelyCheckConsumedArtifacts: false

          # Publish release notes as artifact
          - publish: $(Build.ArtifactStagingDirectory)/releasenotes.md
            artifact: ReleaseNotes

          # Deploy application
          - script: echo "Deploying application to production..."
            displayName: 'Deploy Application'

          # Optional: Create work item or update documentation with release notes
          - script: |
              echo "Release notes generated and published."
              echo "Release notes artifact: $(Build.BuildNumber)"
            displayName: 'Log Release Completion'

# Alternative: Generate release notes for every build (not just releases)
- stage: BuildReleaseNotes
  displayName: 'Generate Build Release Notes'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: GenerateNotes
    displayName: 'Generate Release Notes for Build'
    pool:
      vmImage: 'windows-latest'

    steps:
    - checkout: none

    - task: XplatGenerateReleaseNotes@4
      displayName: 'Generate Build Release Notes'
      inputs:
        outputfile: '$(Build.ArtifactStagingDirectory)/build-releasenotes.md'
        templateLocation: 'File'
        templatefile: 'azure-devops-release-notes-template.md'
        checkStage: true  # Compare against last successful build
        getParentsAndChildren: true
        getPRDetails: true
        emptySetText: 'No changes since last build.'
        replaceFile: true

    - publish: $(Build.ArtifactStagingDirectory)/build-releasenotes.md
      artifact: BuildReleaseNotes